<!DOCTYPE html>
<html>
  <head>
    <title>고라니 게임</title>
  </head>
  <body style="text-align:center;font-family:sans-serif;">
    <h1>(유행을 잘 따라가는) 고라니 키우기</h1>
    <p id="status">배고픔: 50 | 행복: 50</p>
    <button onclick="feed('아스파라거스')">봄동비빔밥</button>
    <button onclick="feed('두쫀쿠')">두쫀쿠</button>
    <button onclick="feed('치킨')">버터떡</button>
    <button onclick="shower()">샤워</button>
  <script>
    let hunger=50;
    let happy=50;
    function update(){
      document.getElementById("status").innerText=
        "배고픔: "+hunger+" | 행복: "+happy;
    }
    function feed(food){
      hunger-=10;
      happy+=5;
      update();
      alert(food+" 맛있어 yar");
    }
    function shower(){
      happy+=10;
      update();
      alert("난 물이 좋아~");
    }  
  </script>
  </body>
</html>
